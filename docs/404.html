<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Vexra</title>
    <meta name="description" content="The page you're looking for doesn't exist. Head back to the Vexra homepage." />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000;
            --fg: #fff;
            --muted: #888;
            --border: rgba(255, 255, 255, 0.12);
            --accent: rgba(120, 80, 255, 0.9);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb--top-right {
            width: 700px;
            height: 700px;
            top: -250px;
            right: -250px;
            background: radial-gradient(circle, rgba(120, 80, 255, 0.12) 0%, rgba(60, 120, 255, 0.05) 40%, transparent 70%);
            animation: pulse 8s ease-in-out infinite alternate;
        }

        .glow-orb--bottom-left {
            width: 600px;
            height: 600px;
            bottom: -200px;
            left: -200px;
            background: radial-gradient(circle, rgba(80, 140, 255, 0.1) 0%, rgba(140, 80, 255, 0.04) 40%, transparent 70%);
            animation: pulse 10s ease-in-out 2s infinite alternate;
        }

        .glow-orb--center {
            width: 800px;
            height: 800px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(120, 80, 255, 0.06) 0%, transparent 60%);
            animation: float 12s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
                transform: scale(1);
            }

            100% {
                opacity: 1;
                transform: scale(1.15);
            }
        }

        @keyframes float {
            0% {
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0.7;
                transform: translate(-48%, -52%) scale(1.1);
            }
        }

        @keyframes glow-text {
            0% {
                text-shadow: 0 0 40px rgba(120, 80, 255, 0.3), 0 0 80px rgba(120, 80, 255, 0.15);
            }

            100% {
                text-shadow: 0 0 60px rgba(120, 80, 255, 0.5), 0 0 120px rgba(120, 80, 255, 0.25);
            }
        }

        @keyframes float-icon {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* Nav */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 0;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .nav::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(120, 80, 255, 0.3), rgba(80, 140, 255, 0.3), transparent);
        }

        .nav__brand {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--fg);
        }

        .nav__toggle {
            display: none;
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--fg);
            width: 40px;
            height: 40px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: border-color 0.2s;
        }

        .nav__toggle:hover {
            border-color: rgba(120, 80, 255, 0.5);
        }

        .nav__links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav__links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav__links a:hover {
            color: var(--fg);
        }

        /* Error Content */
        .error-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 24px;
        }

        .error-content {
            position: relative;
            z-index: 1;
        }

        .error__icon {
            font-size: 3.5rem;
            margin-bottom: 24px;
            animation: float-icon 3s ease-in-out infinite;
        }

        .error__code {
            font-size: clamp(6rem, 18vw, 10rem);
            font-weight: 900;
            letter-spacing: -6px;
            line-height: 1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.9), rgba(80, 140, 255, 0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow-text 4s ease-in-out infinite alternate;
        }

        .error__title {
            font-size: clamp(1.4rem, 3vw, 1.8rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .error__desc {
            color: var(--muted);
            font-size: 1rem;
            max-width: 420px;
            margin: 0 auto 36px;
        }

        .error__actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 100px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn--primary {
            background: var(--fg);
            color: var(--bg);
            border: 1px solid var(--fg);
        }

        .btn--primary:hover {
            background: transparent;
            color: var(--fg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .btn--outline {
            background: transparent;
            color: var(--fg);
            border: 1px solid var(--border);
        }

        .btn--outline:hover {
            border-color: var(--fg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.08);
        }

        .btn__icon {
            width: 18px;
            height: 18px;
            opacity: 0.8;
        }

        /* Footer */
        .footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer__text {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .footer__text a {
            color: var(--fg);
            text-decoration: none;
            font-weight: 500;
        }

        .footer__links {
            display: flex;
            gap: 24px;
        }

        .footer__links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .footer__links a:hover {
            color: var(--fg);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav__toggle {
                display: flex;
            }

            .nav__links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                flex-direction: column;
                gap: 0;
                background: rgba(0, 0, 0, 0.95);
                backdrop-filter: blur(20px);
                border: 1px solid var(--border);
                border-radius: 16px;
                margin-top: 12px;
                padding: 8px;
                z-index: 50;
            }

            .nav__links.active {
                display: flex;
            }

            .nav__links li a {
                display: block;
                padding: 14px 20px;
                border-radius: 10px;
                font-size: 1rem;
                transition: background 0.2s, color 0.2s;
            }

            .nav__links li a:hover {
                background: rgba(120, 80, 255, 0.1);
            }

            .error__code {
                letter-spacing: -3px;
            }

            .error__actions {
                flex-direction: column;
                padding: 0 16px;
            }

            .error__actions .btn {
                width: 100%;
                justify-content: center;
            }

            .footer {
                flex-direction: column;
                text-align: center;
            }

            .footer__links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 16px;
            }
        }

        /* Light theme mobile nav menu */
        html.light .nav__links {
            background: rgba(245, 245, 247, 0.95);
        }

        /* Light Theme */
        html.light body {
            background: #f5f5f7;
            color: #0a0a0a;
        }

        html.light {
            --fg: #0a0a0a;
            --bg: #f5f5f7;
            --muted: #555;
            --border: rgba(0, 0, 0, 0.07);
            --accent: #6c3ce0;
        }

        html.light body::before {
            opacity: 0.025;
        }

        html.light .glow-orb--top-right {
            background: radial-gradient(circle, rgba(108, 60, 224, 0.3) 0%, rgba(139, 92, 246, 0.15) 30%, transparent 70%);
            filter: blur(120px);
        }

        html.light .glow-orb--bottom-left {
            background: radial-gradient(circle, rgba(236, 72, 153, 0.2) 0%, rgba(139, 92, 246, 0.12) 30%, transparent 70%);
        }

        html.light .glow-orb--center {
            background: radial-gradient(circle, rgba(108, 60, 224, 0.08) 0%, transparent 60%);
        }

        html.light .nav::after {
            background: linear-gradient(90deg, transparent, rgba(108, 60, 224, 0.5), rgba(236, 72, 153, 0.4), transparent);
        }

        html.light .error__code {
            background: linear-gradient(135deg, #6c3ce0, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
        }

        html.light .btn--primary {
            background: #0a0a0a;
            color: #f5f5f7;
            border-color: #0a0a0a;
        }

        html.light .btn--primary:hover {
            background: linear-gradient(135deg, #6c3ce0, #8b5cf6);
            border-color: #6c3ce0;
            color: #fff;
            box-shadow: 0 8px 30px rgba(108, 60, 224, 0.35);
            transform: translateY(-2px);
        }

        html.light .btn--outline:hover {
            border-color: #6c3ce0;
            color: #6c3ce0;
            box-shadow: 0 8px 30px rgba(91, 61, 202, 0.1);
            transform: translateY(-2px);
        }

        html.light .footer__links a:hover {
            color: #6c3ce0;
        }

        .theme-toggle {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 100;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            color: var(--fg);
            outline: none;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(120, 80, 255, 0.15);
        }

        html.light .theme-toggle {
            background: rgba(255, 255, 255, 0.65);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
    </style>
    <script src="theme.js"></script>
</head>

<body>
    <div class="glow-orb glow-orb--top-right"></div>
    <div class="glow-orb glow-orb--bottom-left"></div>
    <div class="glow-orb glow-orb--center"></div>

    <!-- Theme Toggle -->
    <button onclick="toggleTheme()" class="theme-toggle" title="Toggle Theme">
        <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
    </button>

    <header class="container" style="position:relative;">
        <nav class="nav">
            <a href="index.html" class="nav__brand">Vexra</a>
            <button class="nav__toggle" onclick="document.querySelector('.nav__links').classList.toggle('active')"
                aria-label="Menu">☰</button>
            <ul class="nav__links">
                <li><a href="index.html">Home</a></li>
                <li><a href="documentation.html">Docs</a></li>
                <li><a href="terms.html">Terms</a></li>
                <li><a href="privacy.html">Privacy</a></li>
            </ul>
        </nav>
    </header>

    <main class="error-page">
        <div class="error-content">
            <div class="error__icon">🛸</div>
            <div class="error__code">404</div>
            <h1 class="error__title">Lost in the signal</h1>
            <p class="error__desc">The page you're looking for has drifted out of range. Let's get you back on the
                network.</p>
            <div class="error__actions">
                <a href="index.html" class="btn btn--primary">
                    <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Go Home
                </a>
                <a href="documentation.html" class="btn btn--outline">
                    <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                    </svg>
                    View Docs
                </a>
            </div>
        </div>
    </main>

    <footer class="container">
        <div class="footer">
            <p class="footer__text">Made with ❤️ by <a href="https://github.com/kunalsahu20" target="_blank">Kunal
                    Sahu</a></p>
            <div class="footer__links">
                <a href="index.html">Home</a>
                <a href="documentation.html">Docs</a>
                <a href="terms.html">Terms</a>
                <a href="privacy.html">Privacy</a>
                <a href="https://github.com/kunalsahu20/mobile-to-cursor" target="_blank">GitHub</a>
                <a href="https://discord.gg/TVFkDKVxR6" target="_blank" style="color:rgba(120,80,255,0.9);">💬
                    Discord</a>
            </div>
        </div>
    </footer>
</body>

</html>
